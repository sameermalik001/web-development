<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A clean and simple Notes App to organize your thoughts.">
    <title>Premium Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <h1 class="header__title">Notes</h1>
            <p class="header__subtitle">Capture your thoughts beautifully</p>
        </header>

        <!-- Add Note Form -->
        <section class="add-note" aria-label="Add a new note">
            <input type="text" class="add-note__title" id="noteTitle" placeholder="What's on your mind?"
                aria-label="Note title">
            <textarea class="add-note__content" id="noteContent" placeholder="Jot down the details..." rows="3"
                aria-label="Note content"></textarea>
            <div class="add-note__actions">
                <button class="btn btn-primary" type="button" id="addNoteBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Note
                </button>
            </div>
        </section>

        <!-- Notes Grid -->
        <section class="notes" aria-label="Your notes">
            <h2 class="notes__heading">Your Collection</h2>
            <div class="notes__grid" id="notesGrid">
                <!-- Notes will be dynamically inserted here -->
            </div>
        </section>

    </div>

    <!-- Edit Note Modal -->
    <div class="modal-overlay" id="editModalOverlay">
        <div class="modal">
            <h2 class="modal__header">Edit Note</h2>
            <div class="modal__form">
                <input type="hidden" id="editNoteId">
                <input type="hidden" id="editNoteColor">
                <input type="text" class="modal__input" id="editNoteTitle" placeholder="Note title...">
                <textarea class="modal__textarea" id="editNoteContent" placeholder="Note content..." rows="4"></textarea>
                <div class="modal__actions">
                    <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                    <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/notes';
        const colors = ['lavender', 'mint', 'peach', 'sky', 'lemon', 'rose'];
        const grid = document.getElementById('notesGrid');
        
        // Modal elements
        const editModalOverlay = document.getElementById('editModalOverlay');
        const editNoteId = document.getElementById('editNoteId');
        const editNoteColor = document.getElementById('editNoteColor');
        const editNoteTitle = document.getElementById('editNoteTitle');
        const editNoteContent = document.getElementById('editNoteContent');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const saveEditBtn = document.getElementById('saveEditBtn');

        // ---- API Helpers ----
        async function fetchNotes() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error('Failed to fetch');
                return await res.json();
            } catch (err) {
                console.error(err);
                return [];
            }
        }

        async function createNote(note) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(note)
                });
                if (!res.ok) throw new Error('Failed to create');
                return await res.json();
            } catch (err) {
                console.error(err);
            }
        }

        async function updateNote(id, note) {
            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(note)
                });
                if (!res.ok) throw new Error('Failed to update');
                return await res.json();
            } catch (err) {
                console.error(err);
            }
        }

        async function removeNote(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('Failed to delete');
            } catch (err) {
                console.error(err);
            }
        }

        // ---- Rendering ----
        async function renderNotes() {
            const notes = await fetchNotes();
            grid.innerHTML = '';
            
            if (!notes || notes.length === 0) {
                grid.innerHTML = '<p class="notes__empty">No notes yet. Add your first note above!</p>';
                return;
            }

            notes.forEach(function(note) {
                const dateObj = new Date(note.created_at);
                const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                
                const cardHTML = `
                    <article class="card card--${note.color}" data-id="${note.id}" data-color="${note.color}">
                        <div class="card__actions">
                            <button class="card__btn card__btn--edit" title="Edit note" aria-label="Edit note">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="card__btn card__btn--delete" title="Delete note" aria-label="Delete note">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                        <h3 class="card__title">${escapeHTML(note.title)}</h3>
                        <p class="card__text">${escapeHTML(note.content)}</p>
                        <div class="card__footer">
                            <span class="card__date">${escapeHTML(dateStr)}</span>
                        </div>
                    </article>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });

            // Attach event listeners to newly rendered cards
            attachCardEvents();
        }

        function attachCardEvents() {
            // Delete handlers
            grid.querySelectorAll('.card__btn--delete').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    const card = e.target.closest('.card');
                    const id = parseInt(card.dataset.id, 10);
                    card.classList.add('card--removing');
                    card.addEventListener('animationend', async function() {
                        await removeNote(id);
                        renderNotes();
                    });
                });
            });

            // Edit handlers
            grid.querySelectorAll('.card__btn--edit').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const card = e.target.closest('.card');
                    const id = card.dataset.id;
                    const color = card.dataset.color;
                    const title = card.querySelector('.card__title').textContent;
                    const content = card.querySelector('.card__text').textContent;

                    openEditModal(id, title, content, color);
                });
            });
        }

        // ---- Edit Modal Logic ----
        function openEditModal(id, title, content, color) {
            editNoteId.value = id;
            editNoteColor.value = color;
            editNoteTitle.value = title;
            editNoteContent.value = content;
            editModalOverlay.classList.add('active');
        }

        function closeEditModal() {
            editModalOverlay.classList.remove('active');
        }

        cancelEditBtn.addEventListener('click', closeEditModal);

        saveEditBtn.addEventListener('click', async function() {
            const id = editNoteId.value;
            const title = editNoteTitle.value.trim();
            const content = editNoteContent.value.trim();
            const color = editNoteColor.value;

            if (!title) {
                editNoteTitle.focus();
                return;
            }

            const updatedNote = { title, content, color };
            
            saveEditBtn.disabled = true;
            saveEditBtn.textContent = 'Saving...';
            
            await updateNote(id, updatedNote);
            
            saveEditBtn.disabled = false;
            saveEditBtn.textContent = 'Save Changes';
            closeEditModal();
            renderNotes();
        });

        // Close modal on click outside
        editModalOverlay.addEventListener('click', function(e) {
            if (e.target === editModalOverlay) {
                closeEditModal();
            }
        });

        // ---- Add Note Actions ----
        async function addNote(title, text) {
            const newNote = {
                title: title,
                content: text,
                color: colors[Math.floor(Math.random() * colors.length)]
            };
            await createNote(newNote);
            renderNotes();
        }

        document.getElementById('addNoteBtn').addEventListener('click', async function() {
            const titleEl = document.getElementById('noteTitle');
            const contentEl = document.getElementById('noteContent');
            const title = titleEl.value.trim();
            const content = contentEl.value.trim();
            
            if (!title) {
                titleEl.focus();
                titleEl.classList.add('add-note__title--error');
                setTimeout(function() { titleEl.classList.remove('add-note__title--error'); }, 800);
                return;
            }
            
            // disable button while adding
            this.disabled = true;
            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.13 15.57a9 9 0 1 0 3.87-10.42L2 8"></path></svg> Adding...';
            
            await addNote(title, content);
            
            this.disabled = false;
            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Add Note';
            
            titleEl.value = '';
            contentEl.value = '';
            titleEl.focus();
        });

        // Allow Ctrl+Enter / Cmd+Enter to add a note quickly
        document.querySelector('.add-note').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                document.getElementById('addNoteBtn').click();
            }
        });

        // ---- Helpers ----
        function escapeHTML(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---- Init ----
        renderNotes();
    </script>
</body>
</html>
