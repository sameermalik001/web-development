<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A clean and simple Notes App to organize your thoughts.">
    <title>Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <h1 class="header__title">📝 Notes App</h1>
            <p class="header__subtitle">Capture your thoughts, ideas &amp; reminders</p>
        </header>

        <!-- Add Note Form -->
        <section class="add-note" aria-label="Add a new note">
            <input type="text" class="add-note__title" id="noteTitle" placeholder="Note title..."
                aria-label="Note title">
            <textarea class="add-note__content" id="noteContent" placeholder="Write your note here..." rows="4"
                aria-label="Note content"></textarea>
            <div class="add-note__actions">
                <button class="add-note__btn" type="button" id="addNoteBtn">
                    + Add Note
                </button>
            </div>
        </section>

        <!-- Notes Grid -->
        <section class="notes" aria-label="Your notes">
            <h2 class="notes__heading">Your Notes</h2>

            <div class="notes__grid">

                <!-- Notes are rendered dynamically by JavaScript -->

            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer__text">Notes App &copy; 2026</p>
    </footer>

    <script>
        const STORAGE_KEY = 'notes_app_data';
        const colors = ['lavender', 'mint', 'peach', 'sky', 'lemon', 'rose'];
        const grid = document.querySelector('.notes__grid');
        const emptyState = document.createElement('p');
        emptyState.className = 'notes__empty';
        emptyState.textContent = 'No notes yet. Add your first note above!';

        // Default starter notes (used only on very first visit)
        const defaultNotes = [
            { title: 'Welcome Note 👋', text: 'This is your Notes App! Use the form above to add new notes. Each note appears here as a card.', date: 'May 3, 2026', color: 'lavender' },
            { title: 'Grocery List 🛒', text: 'Milk, Eggs, Bread, Butter, Fresh Vegetables, Rice, Pasta, Olive Oil, Cheese, Yogurt', date: 'May 2, 2026', color: 'mint' },
            { title: 'Meeting Agenda 📋', text: 'Discuss Q3 goals, review sprint progress, assign new tasks to the team, and plan next week\'s standup schedule.', date: 'May 1, 2026', color: 'peach' },
            { title: 'Book Recommendations 📚', text: 'Atomic Habits – James Clear, Deep Work – Cal Newport, The Pragmatic Programmer, Clean Code – Robert C. Martin', date: 'Apr 30, 2026', color: 'sky' },
            { title: 'Workout Plan 💪', text: 'Mon: Upper Body, Tue: Cardio, Wed: Legs, Thu: Core, Fri: Full Body, Sat: Yoga, Sun: Rest Day', date: 'Apr 29, 2026', color: 'lemon' },
            { title: 'Project Ideas 💡', text: 'Build a weather dashboard, create a portfolio site, make a recipe finder app, design a habit tracker.', date: 'Apr 28, 2026', color: 'rose' }
        ];

        // ---- Data helpers ----
        function loadNotes() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw === null) {
                // First visit — seed with defaults and persist
                localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultNotes));
                return [...defaultNotes];
            }
            return JSON.parse(raw);
        }

        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        // ---- Rendering ----
        function renderNotes() {
            const notes = loadNotes();
            grid.innerHTML = '';
            if (notes.length === 0) {
                grid.appendChild(emptyState);
                return;
            }
            notes.forEach(function(note, index) {
                grid.insertAdjacentHTML('beforeend', createCardHTML(note.title, note.text, note.date, note.color, index));
            });

            // Attach delete handlers
            grid.querySelectorAll('.card__delete').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index, 10);
                    deleteNote(idx);
                });
            });
        }

        // ---- Actions ----
        function addNote(title, text) {
            const notes = loadNotes();
            notes.unshift({
                title: title,
                text: text,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                color: colors[Math.floor(Math.random() * colors.length)]
            });
            saveNotes(notes);
            renderNotes();
        }

        function deleteNote(index) {
            const notes = loadNotes();
            if (index >= 0 && index < notes.length) {
                const card = grid.querySelectorAll('.card')[index];
                if (card) {
                    card.classList.add('card--removing');
                    card.addEventListener('animationend', function() {
                        notes.splice(index, 1);
                        saveNotes(notes);
                        renderNotes();
                    });
                } else {
                    notes.splice(index, 1);
                    saveNotes(notes);
                    renderNotes();
                }
            }
        }

        // ---- Event listeners ----
        document.getElementById('addNoteBtn').addEventListener('click', function() {
            const titleEl = document.getElementById('noteTitle');
            const contentEl = document.getElementById('noteContent');
            const title = titleEl.value.trim();
            const content = contentEl.value.trim();
            if (!title) {
                titleEl.focus();
                titleEl.classList.add('add-note__title--error');
                setTimeout(function() { titleEl.classList.remove('add-note__title--error'); }, 800);
                return;
            }
            addNote(title, content);
            titleEl.value = '';
            contentEl.value = '';
            titleEl.focus();
        });

        // Allow Ctrl+Enter / Cmd+Enter to add a note quickly
        document.querySelector('.add-note').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                document.getElementById('addNoteBtn').click();
            }
        });

        // ---- Helpers ----
        function createCardHTML(title, text, date, color, index) {
            return '<article class="card card--' + color + '">' +
                '<div class="card__header">' +
                    '<h3 class="card__title">' + escapeHTML(title) + '</h3>' +
                    '<button class="card__delete" data-index="' + index + '" title="Delete note" aria-label="Delete note">×</button>' +
                '</div>' +
                '<p class="card__text">' + escapeHTML(text) + '</p>' +
                '<span class="card__date">' + escapeHTML(date) + '</span>' +
                '</article>';
        }

        function escapeHTML(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---- Init ----
        renderNotes();
    </script>

</body>

</html>
