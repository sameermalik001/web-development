<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <h1>Expense Tracker Pro</h1>
            </div>
            <div class="header-stats">
                <div class="stat-card total-balance">
                    <h3>Total Expenses</h3>
                    <h2 id="total-amount">$0.00</h2>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="add-expense-section">
                <h2><i class="fa-solid fa-plus-circle"></i> Add New Expense</h2>
                <form id="expense-form">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" placeholder="E.g., Groceries" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="amount">Amount ($)</label>
                            <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="" disabled selected>Select Category</option>
                                <option value="Food & Dining">Food & Dining</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Health">Health</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Add Expense</button>
                </form>
            </section>

            <section class="expenses-list-section">
                <div class="list-header">
                    <h2><i class="fa-solid fa-list"></i> Recent Expenses</h2>
                </div>
                <div class="expenses-container" id="expenses-container">
                    <!-- Expenses will be dynamically loaded here -->
                    <div class="loading-spinner"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
